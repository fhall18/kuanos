name: Daily Weather Pipeline

on:
  schedule:
    - cron: '18 8 * * *'     # 08:18 UTC, which is 03:18 AM EST
    - cron: '18 11 * * *'    # 11:18 UTC, which is 06:18 AM EST
    - cron: '18 15 * * *'    # 15:18 UTC, which is 11:18 AM EST
    - cron: '18 20 * * *'    # 20:18 UTC, which is 03:18 PM EST
    - cron: '18 1 * * *'     # 01:18 UTC, which is 08:18 PM EST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - run: python pipeline.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || \
            git commit -m "chore: data update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push